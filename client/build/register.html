<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap');
    </style>
</head>

<body>

<header>
    <nav id="nav"></nav>

    <img src="./Images/blackcurrent.png" alt="Logo" class="logo">
    <h1>The BlackCurrent</h1>
    <hr>
</header>

<main>
    <form class="login-register" id="registerForm">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br>

        <label for="first_name">First Name:</label>
        <input type="text" id="first_name" name="first_name" required><br>

        <label for="last_name">Last Name:</label>
        <input type="text" id="last_name" name="last_name" required><br>

        <label for="handle">Handle:</label>
        <input type="text" id="handle" name="handle" required><br>
        
        <input type="submit" value="Register" id="button">
    </form>
</main>

<footer>
  <h3>&copy; 2026 The BlackCurrent. All rights reserved.</h3>  
</footer>

<script type="module" src="scripts/main.js"></script>
<script type="module" src="scripts/user.js"></script>

</body>
</html>
